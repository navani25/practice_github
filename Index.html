<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  
  <style>
    /* Global Resets & Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: #0f172a;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* Card Container */
    .login-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    /* Header */
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header h2 {
      font-size: 1.75rem;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 0.5rem;
    }

    .login-header p {
      color: #94a3b8;
      font-size: 0.9rem;
    }

    /* Form Inputs */
    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
      color: #cbd5e1;
    }

    .input-wrapper {
      position: relative;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #ffffff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    /* Toggle Password Button */
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .toggle-password:hover {
      color: #f8fafc;
    }

    /* Options Row (Remember Me / Forgot Password) */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #cbd5e1;
      cursor: pointer;
    }

    .remember-me input {
      accent-color: #6366f1;
      cursor: pointer;
    }

    .forgot-pass {
      color: #818cf8;
      text-decoration: none;
    }

    .forgot-pass:hover {
      text-decoration: underline;
    }

    /* Submit Button */
    .btn-submit {
      width: 100%;
      padding: 0.75rem;
      background: #6366f1;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-submit:hover {
      background: #4f46e5;
    }

    /* Footer Links */
    .signup-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .signup-link a {
      color: #818cf8;
      text-decoration: none;
      font-weight: 600;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }

    /* Inline Validation Messages */
    .error-message {
      color: #f87171;
      font-size: 0.8rem;
      margin-top: 0.4rem;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-header">
      <h2>Welcome back</h2>
      <p>Please enter your credentials to log in</p>
    </div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="name@company.com" required>
        <div class="error-message" id="emailError">Please enter a valid email address</div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="••••••••" required>
          <button type="button" class="toggle-password" id="togglePassword">Show</button>
        </div>
        <div class="error-message" id="passwordError">Password must be at least 6 characters</div>
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" id="remember">
          Remember me
        </label>
        <a href="#" class="forgot-pass">Forgot password?</a>
      </div>

      <button type="submit" class="btn-submit">Sign In</button>
    </form>

    <div class="signup-link">
      Don't have an account? <a href="#">Sign up</a>
    </div>
  </div>

  <script>
    // JavaScript Logic
    document.addEventListener('DOMContentLoaded', () => {
      const passwordInput = document.getElementById('password');
      const togglePasswordBtn = document.getElementById('togglePassword');
      const loginForm = document.getElementById('loginForm');
      const emailInput = document.getElementById('email');
      const emailError = document.getElementById('emailError');
      const passwordError = document.getElementById('passwordError');

      // 1. Password Visibility Toggle
      togglePasswordBtn.addEventListener('click', () => {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        togglePasswordBtn.textContent = isPassword ? 'Hide' : 'Show';
      });

      // 2. Client-side Validation & Form Submission
      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        let isValid = true;

        // Email Validation
        const emailValue = emailInput.value.trim();
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        
        if (!emailRegex.test(emailValue)) {
          emailError.style.display = 'block';
          isValid = false;
        } else {
          emailError.style.display = 'none';
        }

        // Password Validation
        if (passwordInput.value.length < 6) {
          passwordError.style.display = 'block';
          isValid = false;
        } else {
          passwordError.style.display = 'none';
        }

        // On Successful Validation
        if (isValid) {
          alert(`Sign-in submitted for: ${emailValue}`);
          // You can replace this alert with your API call/fetch request
        }
      });
    });
  </script>
</body>
</html>
